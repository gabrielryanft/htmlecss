<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress nativo HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Barra de progresso nativa do HTML</h1>
    </header>
    <main>
        <label for="filething">Escolha ou largue um arquivo:</label>
        <input type="file" name="filething" id="filething" multiple>
        <div id="dropbox"></div>
        <progress id="barra_progresso" value="0" max="100"></progress>
        <p id="progresso"></p>
    </main>
    <footer>
        <p>Gabriel R. totosão!</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
