<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Arrasta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Image Slider usando scroll-snap</h1>
    </header>
    <main>
        <div id="caixas" scrolling="no">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
        </div>
        <p>Clique no quadrado a cima e use as teclas de direção (Esquerda e direita) para mover as caixas.</p>
    </main>
    <footer>
        <p>Gabriel <span>totosão</span></p>
    </footer>
</body>
</html>
